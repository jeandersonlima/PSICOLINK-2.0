<!DOCTYPE html>
<html lang="pt-br">
	<head>
	    <meta charset="UTF-8">
	    <title>Minha Clínica - Cadastro</title>
	    <link rel="stylesheet" href="/css/style.css">
	</head>
<body>

    <h2>Cadastro de Psicólogo</h2>
    <div class="form-group">
        <label>Nome:</label>
        <input type="text" id="nome">
    </div>
    <div class="form-group">
        <label>E-mail:</label>
        <input type="email" id="email">
    </div>
    <button onclick="cadastrar()">Cadastrar</button>

    <h2>Psicólogos Cadastrados</h2>
    <table id="tabela">
        <thead>
            <tr>
                <th>Nome</th>
                <th>E-mail</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
	
	<script src="/js/script.js"></script>
</body>
</html>
