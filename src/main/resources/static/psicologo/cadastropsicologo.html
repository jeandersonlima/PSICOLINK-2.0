<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PsicoLink - Bem-vindo</title>
    <link rel="stylesheet" href="/css/style.css">
	
	<script src="/js/script.js" defer></script>
	
</head>
<body>
	<nav class="navbar">
	    <a href="../index.html" class="nav-logo">PsicoLink</a>
	    <div class="nav-links">
	       <button class="btn-logout" onclick="window.location.href='../index.html'">Início</button>
	    </div>
	</nav>

	<div class="dashboard-container">
	    <header class="dashboard-header">
	        <h1>Cadastro de Especialista</h1>
	        <p>Preencha os dados abaixo para se vincular à sua clínica ou empresa.</p>
	    </header>

	    <div class="dashboard-grid" style="grid-template-columns: 1fr;"> <section class="db-card" style="max-width: 600px; margin: 0 auto;">
	            <div class="card-header">
	                <span class="icon">⚕️</span>
	                <h3>Dados Profissionais</h3>
	            </div>
	            
	            <div class="form-container">
	                <div class="input-group">
	                    <label>Nome do Psicólogo</label>
	                    <input type="text" id="psi-nome" placeholder="Nome completo">
	                </div>
	                
	                <div class="input-group">
	                    <label>CRP (Registro Profissional)</label>
	                    <input type="text" id="psi-crp" placeholder="00/00000">
	                </div>

	                <div class="input-group">
	                    <label>E-mail de Acesso</label>
	                    <input type="email" id="psi-email" placeholder="psicologo@exemplo.com">
	                </div>

	                <div class="input-group">
	                    <label>ID da Empresa / Clínica</label>
	                    <input type="text" id="psi-empresa" placeholder="Código da empresa vinculada">
	                    <small style="color: #718096; margin-top: 5px;">O psicólogo deve estar associado a uma empresa cadastrada.</small>
	                </div>

	                <button class="btn-primary" onclick="cadastrarPsicologo()">Finalizar Cadastro</button>
	            </div>
	        </section>
	    </div>
	</div>
	
	<div id="custom-alert" class="modal-overlay">
	    <div class="modal-content">
	        <span id='alert-icon' class="modal-icon">⚠️</span>
	        <h3 id="alert-title">Atenção</h3>
	        <p id="alert-message">Mensagem de erro aqui.</p>
	        <button class="btn-primary" onclick="fecharAlerta()">Entendido</button>
	    </div>
	</div>
</body>
