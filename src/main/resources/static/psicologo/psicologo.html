<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PsicoLink - Área do Psicólogo</title>
    <link rel="stylesheet" href="/css/style.css">
	
	<script src="/js/script.js" defer></script>
	
</head>
<body>
	
	<nav class="navbar">
	    <a href="index.html" class="nav-logo">PsicoLink</a>
	    <div class="nav-links">
	      <button class="btn-logout" onclick="window.location.href='../index.html'">Início</button>
	    </div>
	</nav>
	
	<!--Painel de Clientes-->
	<div class="dashboard-container">
	    <header class="dashboard-header">
	        <h1>Painel do Especialista</h1>
	        <p>Bem-vindo de volta. Aqui está a gestão dos seus atendimentos.</p>
	    </header>

	    <div class="stats-grid">
	        <div class="stat-card">
	            <span class="stat-icon">👥</span>
	            <div class="stat-info">
	                <small>Total de Pacientes</small>
	                <h2 id="total-pacientes">--</h2>
	            </div>
	        </div>
	        <div class="stat-card">
	            <span class="stat-icon">📅</span>
	            <div class="stat-info">
	                <small>Sessões Hoje</small>
	                <h2>0</h2>
	            </div>
	        </div>
	    </div>

	    <section class="db-card full-width">
	        <div class="card-header">
	            <span class="icon">📋</span>
	            <h3>Lista de Pacientes</h3>
	        </div>
	        
	        <div class="table-responsive">
	            <table id="tabela-pacientes">
	                <thead>
	                    <tr>
	                        <th>Nome do Paciente</th>
	                        <th>E-mail de Contato</th>
	                        <th>Ações</th>
	                    </tr>
	                </thead>
	                <tbody id="corpo-tabela">
	                    <tr>
	                        <td colspan="3">Carregando pacientes...</td>
	                    </tr>
	                </tbody>
	            </table>
	        </div>
	    </section>
	</div>

    <script src="script.js"></script>
    <script>
        // Garante que a lista carregue assim que abrir esta página
        window.onload = carregarLista;
    </script>
</body>
</html>
